<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (for navbar icon) -->
  <defs>
    <style>
      .icon-bracket {
        stroke: #06b6d4;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .icon-terminal {
        font-family: 'Courier New', monospace;
        font-size: 16px;
        font-weight: bold;
        fill: #06b6d4;
      }
    </style>
  </defs>
  
  <!-- Subtle background -->
  <rect width="60" height="60" fill="#ffffff" rx="8"/>
  
  <!-- Left bracket -->
  <path d="M 12 15 L 8 22 L 12 29" class="icon-bracket"/>
  <path d="M 12 31 L 8 38 L 12 45" class="icon-bracket"/>
  
  <!-- Right bracket -->
  <path d="M 28 15 L 32 22 L 28 29" class="icon-bracket"/>
  <path d="M 28 31 L 32 38 L 28 45" class="icon-bracket"/>
  
  <!-- Terminal symbol in center -->
  <circle cx="20" cy="30" r="10" fill="#06b6d4" opacity="0.15"/>
  <text x="20" y="36" class="icon-terminal" text-anchor="middle" font-size="12">›_</text>
</svg>
