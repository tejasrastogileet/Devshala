<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (optional, for icon context) -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap');
      .devshala-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 28px;
        fill: #ffffff;
        letter-spacing: -0.5px;
      }
      .devshala-accent {
        fill: #06b6d4;
      }
      .code-bracket {
        stroke: #06b6d4;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
    </style>
  </defs>
  
  <!-- Subtle gradient background (light) -->
  <rect width="200" height="200" fill="#ffffff" rx="20"/>
  
  <!-- Left code bracket -->
  <path d="M 35 50 L 25 70 L 35 90" class="code-bracket"/>
  <path d="M 35 110 L 25 130 L 35 150" class="code-bracket"/>
  
  <!-- Right code bracket -->
  <path d="M 85 50 L 95 70 L 85 90" class="code-bracket"/>
  <path d="M 85 110 L 95 130 L 85 150" class="code-bracket"/>
  
  <!-- Terminal symbol (>_) -->
  <circle cx="60" cy="100" r="18" fill="#06b6d4" opacity="0.1"/>
  <text x="60" y="108" style="font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #06b6d4; text-anchor: middle;">›_</text>
  
  <!-- DevShala Text (full version for standalone) -->
  <text x="100" y="32" style="font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; fill: #1e293b; text-anchor: middle; letter-spacing: -0.5px;">DevShala</text>
  
  <!-- Decorative underline accent -->
  <line x1="70" y1="38" x2="130" y2="38" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
</svg>
